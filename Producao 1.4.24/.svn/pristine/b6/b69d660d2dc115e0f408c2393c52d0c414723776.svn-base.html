<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"
"http://www.w3.org/TR/html4/loose.dtd">
<%@ page contentType="text/html;charset=windows-1252"%>
<%@ taglib uri="http://java.sun.com/jstl/core" prefix="c"%>

<table cellspacing="0" cellpadding="0" border="0" width="740" align="center">
	<tr class="SEFAZ-TR-Titulo">
		<td colspan="4">Bens Recebidos</td>
	</tr>
	<tr class="SEFAZ-TR-Titulo">
		<td width="270"><div align="center">Tipo do Bem</div></td>
		<td width="270"><div align="center">Descrição do Bem </div></td>
		<td width="200" colspan="2"><div align="center">Valor Recebido</div></td>
	</tr>
	<c:forEach var="conjuge" items="${conjugeAtual.collVO}" varStatus="contador">
		<c:set var="linhaEstilo" value="SEFAZ-TR-ExibicaoPar"/>
		<c:if test="${contador.count % 2 != 0}">
			<c:set var="linhaEstilo" value="SEFAZ-TR-ExibicaoImpar"></c:set>
		</c:if>
		<c:set var="totalConjuge" value="${totalConjuge + conjuge.valorConjuge}"></c:set>
		<tr class="<c:out value="${linhaEstilo}"></c:out>">
			<td ><div align="center"><c:out value="${conjuge.bemTributavelVo.bemVo.descricaoTipoBem}"/></div></td>
			<td ><div align="center"><c:out value="${conjuge.bemTributavelVo.descricaoBemTributavel}"></c:out></div></td>         
         <td ><div align="right"><c:out value="${conjuge.valorConjugeFormatado}"></c:out></div></td>         
			<td width="40">&nbsp;</td>
		</tr>
	</c:forEach>					
</table>
